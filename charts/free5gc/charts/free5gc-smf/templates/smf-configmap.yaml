{{- with .Values.smf }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "free5gc-smf.fullname" $ }}-configmap
  labels:
    app: {{ $.Values.global.projectName }}
data:
  smfcfg.yaml: |
    info:
      version: 1.0.7
      description: SMF initial local configuration

    configuration:
      serviceNameList:
        {{- .configuration.serviceNameList | nindent 8 }}

      sbi:
        scheme: {{ $.Values.global.sbi.scheme }}
        registerIPv4: {{ include "free5gc-smf.fullname" $ }}-service # IP used to register to NRF
        bindingIPv4: 0.0.0.0  # IP used to bind the service
        port: {{ .service.port }}
        tls:
          key: ../cert/smf.key
          pem: ../cert/smf.pem

      nrfUri: {{ $.Values.global.sbi.scheme }}://{{ $.Values.global.nrf.service.name }}:{{ $.Values.global.nrf.service.port }}

      pfcp:
      # [MODIFIED by 5g-cloud-labs] Set SMF N4 interface IP values for nodeID, listenAddr, and externalAddr using Helm values
        nodeID: {{ $.Values.global.n4networkSMF.n4if.ipAddress }}
        listenAddr: {{ $.Values.global.n4networkSMF.n4if.ipAddress }}
        externalAddr: {{ $.Values.global.n4networkSMF.n4if.ipAddress }}
      # [MODIFIED by 5g-cloud-labs] Separated configuration into two groups:
      # 'configuration1' for user interface manipulation, and 'configuration2' for static/internal settings
      {{- .configuration.configuration1 | nindent 6 }}
      {{- .configuration.configuration2 | nindent 6 }}

    logger:
      {{- toYaml .configuration.logger | nindent 6 }}


  uerouting.yaml: |
    info:
      version: 1.0.7
      description: Routing information for UE
    ueRoutingInfo:
      {{- .configuration.ueRoutingInfo | nindent 6 }}

{{- end }}
