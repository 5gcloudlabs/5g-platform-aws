# [CNAD MOD]
# Modified nested paramter group name (n4network > n4networkSMF)        
{{- if and $.Values.isPfcpNeeded $.Values.global.n4networkSMF.enabled}}
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
# [CNAD MOD]
# Updated value for NAD name ({{ .Values.global.n4network.name }}-{{ include "free5gc-smf.fullname" $ }} > {{ .Values.global.n4networkSMF.name }})
  name: {{ .Values.global.n4networkSMF.name }}
spec:
# [CNAD MOD]
# IPVLAN config updated + MACVLAN config removed.
# whereabouts config added.
  config: '{
      "cniVersion": "0.3.1",
      "plugins": [
       {
          "type": "{{ .Values.global.n4networkSMF.type }}",
          "capabilities": { "ips": true },
          "master": "{{ .Values.global.n4networkSMF.masterIf }}",
          "mode": "l2",
        "ipam": {
          "type": "whereabouts",
          "range": "{{ $.Values.global.n4networkSMF.subnetIP }}/{{ $.Values.global.n4networkSMF.cidr }}",
          "range_start": "{{ $.Values.global.n4networkSMF.n4if.ipAddress }}",
          "range_end": "{{ $.Values.global.n4networkSMF.n4if.ipAddress }}",
          "routes": [{"dst": "{{ $.Values.global.n4networkSMF.routeDST }}",
          "gw": "{{ $.Values.global.n4networkSMF.gatewayIP }}"}]
         }
       }
      ]
    }'
{{- end }}
