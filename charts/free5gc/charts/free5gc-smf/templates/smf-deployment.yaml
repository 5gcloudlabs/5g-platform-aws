{{- with .Values.smf }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "free5gc-smf.fullname" $ }}-{{ .name }}
  labels:
    {{- include "free5gc-smf.labels" $ | nindent 4 }}
    project: {{ $.Values.global.projectName }}
    nf: {{ .name }}
spec:
  {{- if not .autoscaling.enabled }}
  replicas: {{ .replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "free5gc-smf.selectorLabels" $ | nindent 6 }}
      project: {{ $.Values.global.projectName }}
      nf: {{ .name }}
  template:
    metadata:
      annotations:
        {{- include "free5gc-smf.smfAnnotations" $ | nindent 8 }}
        # [MODIFIED by 5g-cloud-labs]
        # Renamed nested parameter group: 'n4network' to 'n4networkSMF' for SMF-specific configuration control 
        {{- if and $.Values.isPfcpNeeded $.Values.global.n4networkSMF.enabled}}
        # [MODIFIED by 5g-cloud-labs]
        # Removed static IP parameters; IP assignment now handled by Whereabouts via the corresponding NAD
        k8s.v1.cni.cncf.io/networks: '[
            { "name": "{{ $.Values.global.n4networkSMF.name }}",
              "interface": "n4"
            }]'
        {{- end }}
        checksum/config: {{ include (print $.Template.BasePath "/smf-configmap.yaml") $ | sha256sum }}
        # [MODIFIED by 5g-cloud-labs]
        # Added annotation to delay application startup until Istio sidecar proxy is ready.
        # Ref: https://istio.io/latest/docs/reference/config/istio.mesh.v1alpha1/#ProxyConfig-hold_application_until_proxy_starts
        {{- if $.Values.global.proxy.holdApplicationUntilProxyStarts }}
        proxy.istio.io/config: '{ "holdApplicationUntilProxyStarts": true }'
        {{- end }}
      labels:
        {{- include "free5gc-smf.selectorLabels" $ | nindent 8 }}
        project: {{ $.Values.global.projectName }}
        nf: {{ .name }}
    spec:
      imagePullSecrets:
        {{- toYaml .imagePullSecrets | nindent 8 }}
      securityContext:
        {{- toYaml .podSecurityContext | nindent 8 }}
      initContainers:
      - name: wait-nrf
        {{- with $.Values.initcontainers.curl }}
        image: {{ .registry }}/{{ .image }}:{{ .tag }}
        {{- end }}
        env:
        - name: DEPENDENCIES
          value: {{ $.Values.global.sbi.scheme }}://{{ $.Values.global.nrf.service.name }}:{{ $.Values.global.nrf.service.port }}
        command: ['sh', '-c', 'set -x; for dependency in $DEPENDENCIES; do while [ $(curl --insecure --connect-timeout 1 -s -o /dev/null -w "%{http_code}" $dependency) -ne 200 ]; do echo waiting for dependencies; sleep 1; done; done;']
      # [MODIFIED by 5g-cloud-labs]
      # Added initContainer for automated secondary IP assignment to the respective ENI on AWS.
      # Ref: https://github.com/aws-samples/eks-automated-ipmgmt-multus-pods/tree/main
      - name: aws-ip-mgmt
        {{- with $.Values.initcontainers.awsipmgmt }}
        image: {{ .registry }}/{{ .image }}:{{ .tag }}
        {{- end }}
        imagePullPolicy: IfNotPresent
        args: [/bin/sh, -c, '/app/script.sh initContainers']   
      containers:
      - name: {{ .name }}
        image: {{ .image.name }}:{{ .image.tag | default $.Chart.AppVersion }}
        imagePullPolicy: {{ .image.pullPolicy }}
        securityContext:
            {{- toYaml .securityContext | nindent 12 }}
        ports:
        - name: nsmf
          containerPort: {{ .service.port }}
        {{- if $.Values.isPfcpNeeded }}
        - name: n4
          containerPort: 8805
          protocol: UDP
        {{- end }}
        command: ["./smf"]
        args: ["-c", "../config/smfcfg.yaml", "-u", "../config/uerouting.yaml"]
        env:
          - name: GIN_MODE
            value: release
        volumeMounts:
        - mountPath: {{ .volume.mount }}
          name: {{ include "free5gc-smf.fullname" $ }}-volume
        resources:
            {{- toYaml .resources | nindent 12 }}
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      nodeSelector:
        {{- toYaml .nodeSelector | nindent 8 }}
      affinity:
        {{- toYaml .affinity | nindent 8 }}
      tolerations:
        {{- toYaml .tolerations | nindent 8 }}

      volumes:
      - name: {{ include "free5gc-smf.fullname" $ }}-volume
        projected:
          sources:
          - configMap:
              name: {{ include "free5gc-smf.fullname" $ }}-configmap
              items:
              - key: smfcfg.yaml
                path: smfcfg.yaml
              - key: uerouting.yaml
                path: uerouting.yaml
{{- end }}
