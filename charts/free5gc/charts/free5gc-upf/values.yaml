# [MODIFIED by 5g-cloud-labs]
# This values.yaml has been customized for aws-5gcloudlabs.
# Networking parametes values are inherited from the customized global values.yaml.
#
global:
  projectName: free5gc
  userPlaneArchitecture: single  # possible values are "single" and "ulcl"
  uesubnet: 10.1.0.0/16
# [MODIFIED by 5g-cloud-labs]
# Custom-built AWS IP Manager image published by 5g-cloud-labs to public ECR.
# Source reference: https://github.com/aws-samples/eks-automated-ipmgmt-multus-pods
initcontainers:
  awsipmgmt:
    registry: public.ecr.aws/g8c8r6q0
    image: aws-ip-manager
    tag: "0.1"
    
upf:
  name: upf
  replicaCount: 1
  image:
    name: towards5gs/free5gc-upf
    pullPolicy: Always
  configmap:
    wrapperAdditionalCommands: ""
    # wrapperAdditionalCommands: |
    #   echo "123" > /tmp/123
  volume:
    mount: /free5gc/config/

  podAnnotations: {}
    # additional annotations
  imagePullSecrets: []
  podSecurityContext: {}
  securityContext:
    capabilities:
      add: ["NET_ADMIN"]
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
  readinessProbe:
    initialDelaySeconds: 0
    periodSeconds: 1
    timeoutSeconds: 1
    failureThreshold:  40
    successThreshold: 1
  livenessProbe:
    initialDelaySeconds: 120
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 3
    successThreshold: 1
# [MODIFIED by 5g-cloud-labs]
# Updated nodeSelector to schedule UPF on 5guserplane node
  nodeSelector:
    userplane: "true"
  tolerations: []
  affinity: {}
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80
  configuration:
    dnnList: # The DNN list supported by UPF
      - dnn: internet # Data Network Name
        cidr: 10.1.0.0/17 # Classless Inter-Domain Routing for assigned IPv4 pool of UE
        natifname: n6

    logger: # log output setting
      enable: true # true or false
      level: info # how detailed to output, value: trace, debug, info, warn, error, fatal, panic
      reportCaller: false # enable the caller report or not, value: true or false

