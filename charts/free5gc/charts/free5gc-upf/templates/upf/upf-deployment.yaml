{{- if eq .Values.global.userPlaneArchitecture "single" }}
{{- with .Values.upf }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "free5gc-upf.fullname" $ }}-{{ .name }}
  labels:
    {{- include "free5gc-upf.labels" $ | nindent 4 }}
    project: {{ $.Values.global.projectName }}
    nf: {{ .name }}
spec:
  {{- if not .autoscaling.enabled }}
  replicas: {{ .replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "free5gc-upf.selectorLabels" $ | nindent 6 }}
      project: {{ $.Values.global.projectName }}
      nf: {{ .name }}
  template:
    metadata:
      annotations:
        {{- include "free5gc-upf.upfAnnotations" $ | nindent 8 }}
        # [MODIFIED by 5g-cloud-labs]
        # Removed static IP parameters – IP assignment now managed by Whereabouts via respective NADs.
        # Updated network names for UPF N3 & N4 networks for UPF-specific configuration control 
        k8s.v1.cni.cncf.io/networks: '[
            { "name": "{{ $.Values.global.n3networkUPF.name }}",
              "interface": "n3"
            },
            { "name": "{{ $.Values.global.n4networkUPF.name }}",
              "interface": "n4"
            },
            { "name": "{{ $.Values.global.n6network.name }}",
              "interface": "n6"
            }
            ]'
        checksum/config: {{ include (print $.Template.BasePath "/upf/upf-configmap.yaml") $ | sha256sum }}
        # [MODIFIED by 5g-cloud-labs]
        # Added annotation to delay application startup until Istio sidecar proxy is ready.
        # Ref: https://istio.io/latest/docs/reference/config/istio.mesh.v1alpha1/#ProxyConfig-hold_application_until_proxy_starts
        {{- if $.Values.global.proxy.holdApplicationUntilProxyStarts }}
        proxy.istio.io/config: '{ "holdApplicationUntilProxyStarts": true }'
        {{- end }}        
      labels:
        {{- include "free5gc-upf.selectorLabels" $ | nindent 8 }}
        project: {{ $.Values.global.projectName }}
        nf: {{ .name }}
    spec:
      imagePullSecrets:
        {{- toYaml .imagePullSecrets | nindent 8 }}
      securityContext:
        {{- toYaml .podSecurityContext | nindent 8 }}
      # [MODIFIED by 5g-cloud-labs]
      # Added initContainer for automated secondary IP assignment to the respective ENI on AWS.
      # Ref: https://github.com/aws-samples/eks-automated-ipmgmt-multus-pods/tree/main
      initContainers:
      - name: aws-ip-mgmt
        {{- with $.Values.initcontainers.awsipmgmt }}
        image: {{ .registry }}/{{ .image }}:{{ .tag }}
        {{- end }}
        imagePullPolicy: IfNotPresent
        args: [/bin/sh, -c, '/app/script.sh initContainers']        
      containers:
      - name: {{ .name }}
        image: {{ .image.name }}:{{ .image.tag | default $.Chart.AppVersion }}
        imagePullPolicy: {{ .image.pullPolicy }}
        securityContext:
            {{- toYaml .securityContext | nindent 12 }}
        ports:
        - name: n4
          containerPort: 8805
          protocol: UDP
        command: ["{{ .volume.mount }}/wrapper.sh"]
        volumeMounts:
        - mountPath: {{ .volume.mount }}
          name: {{ include "free5gc-upf.fullname" $ }}-{{ .name }}-volume
        resources:
            {{- toYaml .resources | nindent 12 }}
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      nodeSelector:
        {{- toYaml .nodeSelector | nindent 8 }}
      affinity:
        {{- toYaml .affinity | nindent 8 }}
      tolerations:
        {{- toYaml .tolerations | nindent 8 }}

      volumes:
      - name: {{ include "free5gc-upf.fullname" $ }}-{{ .name }}-volume
        projected:
          sources:
          - configMap:
              name: {{ include "free5gc-upf.fullname" $ }}-{{ .name }}-configmap
              items:
              - key: upfcfg.yaml
                path: upfcfg.yaml
              - key: wrapper.sh
                path: wrapper.sh
                mode: 0777
{{- end }}
{{- end }}
