# [MODIFIED by 5g-cloud-labs]
# Renamed nested parameter group: 'n3network' > 'n3networkUPF'
{{- if $.Values.global.n3networkUPF.enabled}}
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
# [MODIFIED by 5g-cloud-labs]
# Updated value for NAD name.
  name: {{ .Values.global.n3networkUPF.name }}
spec:
# [MODIFIED by 5g-cloud-labs]
# Added host-device CNI plugin configuration.
# Removed macvlan/ipvlan configuration.
# Integrated IPAM with Whereabouts.
  config: '{
  "cniVersion": "0.3.1",
  "plugins": [
    {
      "type": "{{ .Values.global.n3networkUPF.type }}",
      "device": "{{ $.Values.global.n3networkUPF.masterIf }}",
      "ipam": {
        "type": "whereabouts",
        "range": "{{ $.Values.global.n3networkUPF.subnetIP }}/{{ $.Values.global.n3networkUPF.cidr }}",
        "range_start": "{{ $.Values.global.n3networkUPF.n3if.ipAddress }}",
        "range_end": "{{ $.Values.global.n3networkUPF.n3if.ipAddress }}",
        "routes": [
          {
            "dst": "{{ $.Values.global.n3networkUPF.routeDST }}",
            "gw": "{{ $.Values.global.n3networkUPF.gatewayIP }}"
          }
        ]
      }
    },
    {
      "type": "tuning",
      "mtu": 9000
    }
  ]
}'
{{- end }}
