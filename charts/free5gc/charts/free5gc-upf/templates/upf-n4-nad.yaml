# [MODIFIED by 5g-cloud-labs]
# Modified nested paramter group name (n4network > n4networkUPF)
{{- if $.Values.global.n4networkUPF.enabled}}
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
# [MODIFIED by 5g-cloud-labs]
# Updated value for NAD name.
  name: {{ .Values.global.n4networkUPF.name }}
spec:
# [MODIFIED by 5g-cloud-labs]
# IPVLAN config updated + MACVLAN config removed.
# whereabouts config added.
  config: '{
      "cniVersion": "0.3.1",
      "plugins": [
       {
          "type": "{{ .Values.global.n4networkUPF.type }}",
          "capabilities": { "ips": true },
          "master": "{{ .Values.global.n4networkUPF.masterIf }}",
          "mode": "l2",
          "ipam": {
            "type": "whereabouts",
            "range": "{{ $.Values.global.n4networkUPF.subnetIP }}/{{ $.Values.global.n4networkUPF.cidr }}",
            "range_start": "{{ $.Values.global.n4networkUPF.n4if.ipAddress }}",
            "range_end": "{{ $.Values.global.n4networkUPF.n4if.ipAddress }}",
            "routes": [{"dst": "{{ $.Values.global.n4networkUPF.routeDST }}",
            "gw": "{{ $.Values.global.n4networkUPF.gatewayIP }}"}]
         }
       }
      ]
    }'
{{- end }}
