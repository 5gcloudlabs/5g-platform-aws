apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: 5g-solution-wf
  namespace: argo
spec:
  serviceAccountName: argo-workflow
  entrypoint: 5g-solution
  templates:
    - name: 5g-solution
      dag:
        tasks:
          - name: task1-free5gc
            template: free5gc

          - name: delay-60s
            template: delay-60
            dependencies:
              - task1-free5gc

          - name: task2-sub-prov
            template: sub-prov
            dependencies:
              - task1-free5gc
              - delay-60s

          - name: delay-10s
            template: delay-10
            dependencies:
              - task2-sub-prov

          - name: task3-ueransim
            template: ueransim
            dependencies:
              - task2-sub-prov
              - delay-10s

    # ── Step 1: Deploy 5G Core ─────────────────────────────────────────────
    - name: free5gc
      resource:
        action: create
        successCondition: status.health.status == Healthy
        failureCondition: status.health.status == Degraded
        manifest: |
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: free5gc-init
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: https://github.com/5g-cloud-labs/new-test-2.git
              targetRevision: trims
              path: 5g/argocd-apps/free5gc-app
              plugin:
                name: envsubst
                env:
                  - name: MCC
                    value: "{{ mcc }}"
                  - name: MNC
                    value: "{{ mnc }}"
            destination:
              server: https://kubernetes.default.svc
              namespace: free5gc
            syncPolicy:
              automated:
                prune: true
                selfHeal: true

    # ── Delay: 60s buffer after core is Healthy ────────────────────────────
    - name: delay-60
      suspend:
        duration: "60s"

    # ── Step 2: Provision Subscribers ──────────────────────────────────────
    - name: sub-prov
      resource:
        action: create
        successCondition: status.health.status == Healthy
        failureCondition: status.health.status == Degraded
        manifest: |
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: sub-prov-init
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: https://github.com/5g-cloud-labs/new-test-2.git
              targetRevision: trims
              path: 5g/argocd-apps/sub-prov-app
              plugin:
                name: envsubst
                env:
                  - name: MCC
                    value: "{{ mcc }}"
                  - name: MNC
                    value: "{{ mnc }}"
                  - name: COUNT
                    value: "{{ count }}"
            destination:
              server: https://kubernetes.default.svc
              namespace: free5gc
            syncPolicy:
              automated:
                prune: true
                selfHeal: true

    # ── Delay: 10s buffer after sub-prov Job completes ────────────────────
    - name: delay-10
      suspend:
        duration: "10s"

    # ── Step 3: Deploy UE & RAN Simulation ────────────────────────────────
    - name: ueransim
      resource:
        action: create
        successCondition: status.health.status == Healthy
        failureCondition: status.health.status == Degraded
        manifest: |
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: ueransim-init
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: https://github.com/5g-cloud-labs/new-test-2.git
              targetRevision: trims
              path: 5g/argocd-apps/ueransim-app
              plugin:
                name: envsubst
                env:
                  - name: MCC
                    value: "{{ mcc }}"
                  - name: MNC
                    value: "{{ mnc }}"
                  - name: COUNT
                    value: "{{ count }}"
            destination:
              server: https://kubernetes.default.svc
              namespace: free5gc
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
