apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: 5gcore-sub-prov-wf
  namespace: argo
spec:
  serviceAccountName: argo-workflow
  entrypoint: 5gcore-sub-prov
  templates:
    - name: 5gcore-sub-prov
      dag:
        tasks:
          - name: task1
            template: free5gc

          - name: delay-task
            template: delay

          - name: task2
            template: sub-prov
            dependencies:
              - task1
              - delay-task

    - name: free5gc
      resource:
        action: create
        successCondition: status.health.status == Healthy
        failureCondition: status.health.status == Degraded
        manifest: |
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: free5gc-init
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: https://github.com/5g-cloud-labs/new-test-2.git
              targetRevision: trims
              path: 5g/argocd-apps/free5gc-app
              plugin:
                name: envsubst
                env:
                  - name: MCC
                    value: "{{ mcc }}"
                  - name: MNC
                    value: "{{ mnc }}"
            destination:
              server: https://kubernetes.default.svc
              namespace: free5gc
            syncPolicy:
              automated:
                prune: true
                selfHeal: true

    - name: delay
      suspend:
        duration: "60s"

    - name: sub-prov
      resource:
        action: create
        successCondition: status.health.status == Healthy
        failureCondition: status.health.status == Degraded
        manifest: |
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: sub-prov-init
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: https://github.com/5g-cloud-labs/new-test-2.git
              targetRevision: trims
              path: 5g/argocd-apps/sub-prov-app
              plugin:
                name: envsubst
                env:
                  - name: MCC
                    value: "{{ mcc }}"
                  - name: MNC
                    value: "{{ mnc }}"
                  - name: COUNT
                    value: "{{ count }}"
            destination:
              server: https://kubernetes.default.svc
              namespace: free5gc
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
