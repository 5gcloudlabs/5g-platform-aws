apiVersion: batch/v1
kind: Job
metadata:
  name: sub-prov-job
  namespace: default
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600

  template:
    spec:
      restartPolicy: Never

      containers:
      - name: subscriber-provisioner
        image: curlimages/curl:8.5.0

        env:
        - name: MCC
          value: insert_value
        - name: MNC
          value: insert_value
        - name: COUNT
          value: insert_value

        command: ["/bin/sh","-c"]

        args:
        - |
          set -ex

          OUTPUT_FILE=/tmp/subs-prov-output.log
          rm -f $OUTPUT_FILE

          echo "*** Starting provisioning of ($COUNT) subscribers with IMSI range beginning at (${MCC}${MNC}0000000001) ***"
          echo
          echo "Please wait..."
          echo

          for i in $(seq 1 $COUNT); do

            imsi="${MCC}${MNC}$(printf "%010d" $i)"

            payload=$(printf '{
              "plmnID": "%s",
              "ueId": "imsi-%s",
              "AuthenticationSubscription": {
                "authenticationManagementField": "8000",
                "authenticationMethod": "5G_AKA",
                "milenage": {
                  "op": {
                    "encryptionAlgorithm": 0,
                    "encryptionKey": 0,
                    "opValue": ""
                  }
                },
                "opc": {
                  "encryptionAlgorithm": 0,
                  "encryptionKey": 0,
                  "opcValue": "8e27b6af0e692e750f32667a3b14605d"
                },
                "permanentKey": {
                  "encryptionAlgorithm": 0,
                  "encryptionKey": 0,
                  "permanentKeyValue": "8baf473f2f8fd09487cccbd7097c6862"
                },
                "sequenceNumber": "16f3b3f70fc2"
              },
              "AccessAndMobilitySubscriptionData": {
                "gpsis": ["msisdn-"],
                "nssai": {
                  "defaultSingleNssais": [
                    {"sst":1,"sd":"010203","isDefault":true},
                    {"sst":1,"sd":"112233","isDefault":true}
                  ],
                  "singleNssais": []
                },
                "subscribedUeAmbr": {
                  "downlink": "2 Gbps",
                  "uplink": "1 Gbps"
                }
              },
              "FlowRules": []
            }' "${MCC}${MNC}" "$imsi")

            curl -v -X POST \
              "webui-service.free5gc.svc.cluster.local:5000/api/subscriber/imsi-${imsi}/${MCC}${MNC}" \
              -H "Host: webui-service.free5gc.svc.cluster.local:5000" \
              -H "Token: admin" \
              --data-raw "$payload" >> $OUTPUT_FILE 2>&1

          done

          echo
          echo "===== Provisioned IMSI List ====="
          echo

          grep "imsi-" $OUTPUT_FILE | awk -F'imsi-|/' '{print $5}'
