        "01010203": {
          "snssai": {"sst": 1, "sd": "010203"},
          "smPolicyDnnData": {
            "internet": {"dnn": "internet"},
            "internet2": {"dnn": "internet2"}
          }
        },
        "01112233": {
          "snssai": {"sst": 1, "sd": "112233"},
          "smPolicyDnnData": {
            "internet": {"dnn": "internet"},
            "internet2": {"dnn": "internet2"}
          }
        }
      }
    },
    "FlowRules": []
  }
EOF
          done

          echo ""
          echo "===== Provisioned IMSIs ====="
          seq $start_imsi $end_imsi | sed 's/^/imsi-/'
