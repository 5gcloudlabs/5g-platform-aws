apiVersion: batch/v1
kind: Job
metadata:
  generateName: subscriber-provisioner-
  namespace: free5gc
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: subscriber-provisioner
        image: curlimages/curl:8.5.0
        command: ["/bin/sh","-c"]
        args:
        - |
          set -e

          start_imsi="${ARGOCD_ENV_MCC}${ARGOCD_ENV_MNC}0000000001"
          end_imsi=$((start_imsi + COUNT - 1))

          echo "Starting provisioning of $COUNT subscribers"
          echo "IMSI range: $start_imsi -> $end_imsi"

          for imsi in $(seq $start_imsi $end_imsi); do

            echo "Provisioning imsi-$imsi"

            curl -s -X POST "http://webui-service.free5gc.svc.cluster.local:5000/api/subscriber/imsi-${imsi}/${ARGOCD_ENV_MCC}${ARGOCD_ENV_MNC}" \
              -H "Token: admin" \
              -H "Content-Type: application/json" \
    --data @- <<EOF
    {"plmnID": "${ARGOCD_ENV_MCC}${ARGOCD_ENV_MNC}",
    "ueId": "imsi-${imsi}",
    "AuthenticationSubscription": {
      "authenticationManagementField": "8000",
      "authenticationMethod": "5G_AKA",
      "milenage": {
        "op": {
          "encryptionAlgorithm": 0,
          "encryptionKey": 0,
          "opValue": ""
        }
      },
      "opc": {
        "encryptionAlgorithm": 0,
        "encryptionKey": 0,
        "opcValue": "8e27b6af0e692e750f32667a3b14605d"
      },
      "permanentKey": {
        "encryptionAlgorithm": 0,
        "encryptionKey": 0,
        "permanentKeyValue": "8baf473f2f8fd09487cccbd7097c6862"
      },
      "sequenceNumber": "16f3b3f70fc2"
    },
    "AccessAndMobilitySubscriptionData": {
      "gpsis": ["msisdn-"],
      "nssai": {
        "defaultSingleNssais": [
          {"sst": 1, "sd": "010203", "isDefault": true},
          {"sst": 1, "sd": "112233", "isDefault": true}
        ],
        "singleNssais": []
      },
      "subscribedUeAmbr": {
        "downlink": "2 Gbps",
        "uplink": "1 Gbps"
      }
    },
    "SessionManagementSubscriptionData": [
      {
        "singleNssai": {"sst": 1, "sd": "010203"},
        "dnnConfigurations": {
          "internet": {
            "sscModes": {
              "defaultSscMode": "SSC_MODE_1",
              "allowedSscModes": ["SSC_MODE_2", "SSC_MODE_3"]
            },
            "pduSessionTypes": {
              "defaultSessionType": "IPV4",
              "allowedSessionTypes": ["IPV4"]
            },
            "sessionAmbr": {
              "uplink": "200 Mbps",
              "downlink": "100 Mbps"
            },
            "5gQosProfile": {
              "5qi": 9,
              "arp": {
                "priorityLevel": 8
              },
              "priorityLevel": 8
            }
          },
          "internet2": {
            "sscModes": {
              "defaultSscMode": "SSC_MODE_1",
              "allowedSscModes": ["SSC_MODE_2", "SSC_MODE_3"]
            },
            "pduSessionTypes": {
              "defaultSessionType": "IPV4",
              "allowedSessionTypes": ["IPV4"]
            },
            "sessionAmbr": {
              "uplink": "200 Mbps",
              "downlink": "100 Mbps"
            },
            "5gQosProfile": {
              "5qi": 9,
              "arp": {
                "priorityLevel": 8
              },
              "priorityLevel": 8
            }
          }
        }
      },
      {
        "singleNssai": {"sst": 1, "sd": "112233"},
        "dnnConfigurations": {
          "internet": {
            "sscModes": {
              "defaultSscMode": "SSC_MODE_1",
              "allowedSscModes": ["SSC_MODE_2", "SSC_MODE_3"]
            },
            "pduSessionTypes": {
              "defaultSessionType": "IPV4",
              "allowedSessionTypes": ["IPV4"]
            },
            "sessionAmbr": {
              "uplink": "200 Mbps",
              "downlink": "100 Mbps"
            },
            "5gQosProfile": {
              "5qi": 9,
              "arp": {
                "priorityLevel": 8
              },
              "priorityLevel": 8
            }
          },
          "internet2": {
            "sscModes": {
              "defaultSscMode": "SSC_MODE_1",
              "allowedSscModes": ["SSC_MODE_2", "SSC_MODE_3"]
            },
            "pduSessionTypes": {
              "defaultSessionType": "IPV4",
              "allowedSessionTypes": ["IPV4"]
            },
            "sessionAmbr": {
              "uplink": "200 Mbps",
              "downlink": "100 Mbps"
            },
            "5gQosProfile": {
              "5qi": 9,
              "arp": {
                "priorityLevel": 8
              },
              "priorityLevel": 8
            }
          }
        }
      }
    ],
    "SmfSelectionSubscriptionData": {
      "subscribedSnssaiInfos": {
        "01010203": {
          "dnnInfos": [
            {"dnn": "internet"},
            {"dnn": "internet2"}
          ]
        },
        "01112233": {
          "dnnInfos": [
            {"dnn": "internet"},
            {"dnn": "internet2"}
          ]
        }
      }
    },
    "AmPolicyData": {
      "subscCats": ["free5gc"]
    },
    "SmPolicyData": {
