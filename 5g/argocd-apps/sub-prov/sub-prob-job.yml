apiVersion: batch/v1
kind: Job
metadata:
  name: sub-prov-job
  namespace: default
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: subscriber-provisioner
        image: curlimages/curl:8.5.0
        env:
        - name: MCC
          value: "{{ARGOCD_ENV_MCC}}"
        - name: MNC
          value: "{{ARGOCD_ENV_MNC}}"
        - name: COUNT
          value: "{{ARGOCD_ENV_COUNT}}"
          
        command: ["/bin/sh","-c"]
        args:
        - |
          set -e

          start_imsi="${MCC}${MNC}0000000001"
          end_imsi=$((start_imsi + COUNT - 1))

          echo "Starting provisioning of $COUNT subscribers"
          echo "IMSI range: $start_imsi -> $end_imsi"

          JSON_TEMPLATE='{
            "plmnID": "__PLMN__",
            "ueId": "imsi-__IMSI__",
            "AuthenticationSubscription": {
              "authenticationManagementField": "8000",
              "authenticationMethod": "5G_AKA",
              "milenage": {
                "op": {
                  "encryptionAlgorithm": 0,
                  "encryptionKey": 0,
                  "opValue": ""
                }
              },
              "opc": {
                "encryptionAlgorithm": 0,
                "encryptionKey": 0,
                "opcValue": "8e27b6af0e692e750f32667a3b14605d"
              },
              "permanentKey": {
                "encryptionAlgorithm": 0,
                "encryptionKey": 0,
                "permanentKeyValue": "8baf473f2f8fd09487cccbd7097c6862"
              },
              "sequenceNumber": "16f3b3f70fc2"
            },
            "AccessAndMobilitySubscriptionData": {
              "gpsis": ["msisdn-"],
              "nssai": {
                "defaultSingleNssais": [
                  {"sst": 1, "sd": "010203", "isDefault": true},
                  {"sst": 1, "sd": "112233", "isDefault": true}
                ],
                "singleNssais": []
              },
              "subscribedUeAmbr": {
                "downlink": "2 Gbps",
                "uplink": "1 Gbps"
              }
            },
            "SessionManagementSubscriptionData": [
              {
                "singleNssai": {"sst": 1, "sd": "010203"},
                "dnnConfigurations": {
                  "internet": {
                    "sscModes": {
                      "defaultSscMode": "SSC_MODE_1",
                      "allowedSscModes": ["SSC_MODE_2", "SSC_MODE_3"]
                    },
                    "pduSessionTypes": {
                      "defaultSessionType": "IPV4",
                      "allowedSessionTypes": ["IPV4"]
                    },
                    "sessionAmbr": {
                      "uplink": "200 Mbps",
                      "downlink": "100 Mbps"
                    },
                    "5gQosProfile": {
                      "5qi": 9,
                      "arp": {"priorityLevel": 8},
                      "priorityLevel": 8
                    }
                  },
                  "internet2": {
                    "sscModes": {
                      "defaultSscMode": "SSC_MODE_1",
                      "allowedSscModes": ["SSC_MODE_2", "SSC_MODE_3"]
                    },
                    "pduSessionTypes": {
                      "defaultSessionType": "IPV4",
                      "allowedSessionTypes": ["IPV4"]
                    },
                    "sessionAmbr": {
                      "uplink": "200 Mbps",
                      "downlink": "100 Mbps"
                    },
                    "5gQosProfile": {
                      "5qi": 9,
                      "arp": {"priorityLevel": 8},
                      "priorityLevel": 8
                    }
                  }
                }
              },
              {
                "singleNssai": {"sst": 1, "sd": "112233"},
                "dnnConfigurations": {
                  "internet": {
                    "sscModes": {
                      "defaultSscMode": "SSC_MODE_1",
                      "allowedSscModes": ["SSC_MODE_2", "SSC_MODE_3"]
                    },
                    "pduSessionTypes": {
                      "defaultSessionType": "IPV4",
                      "allowedSessionTypes": ["IPV4"]
                    },
                    "sessionAmbr": {
                      "uplink": "200 Mbps",
                      "downlink": "100 Mbps"
                    },
                    "5gQosProfile": {
                      "5qi": 9,
                      "arp": {"priorityLevel": 8},
                      "priorityLevel": 8
                    }
                  },
                  "internet2": {
                    "sscModes": {
                      "defaultSscMode": "SSC_MODE_1",
                      "allowedSscModes": ["SSC_MODE_2", "SSC_MODE_3"]
                    },
                    "pduSessionTypes": {
                      "defaultSessionType": "IPV4",
                      "allowedSessionTypes": ["IPV4"]
                    },
                    "sessionAmbr": {
                      "uplink": "200 Mbps",
                      "downlink": "100 Mbps"
                    },
                    "5gQosProfile": {
                      "5qi": 9,
                      "arp": {"priorityLevel": 8},
                      "priorityLevel": 8
                    }
                  }
                }
              }
            ],
            "SmfSelectionSubscriptionData": {
              "subscribedSnssaiInfos": {
                "01010203": {"dnnInfos": [{"dnn": "internet"}, {"dnn": "internet2"}]},
                "01112233": {"dnnInfos": [{"dnn": "internet"}, {"dnn": "internet2"}]}
              }
            },
            "AmPolicyData": {
              "subscCats": ["free5gc"]
            },
            "SmPolicyData": {
              "smPolicySnssaiData": {
                "01010203": {
                  "snssai": {"sst": 1, "sd": "010203"},
                  "smPolicyDnnData": {
                    "internet": {"dnn": "internet"},
                    "internet2": {"dnn": "internet2"}
                  }
                },
                "01112233": {
                  "snssai": {"sst": 1, "sd": "112233"},
                  "smPolicyDnnData": {
                    "internet": {"dnn": "internet"},
                    "internet2": {"dnn": "internet2"}
                  }
                }
              }
            },
            "FlowRules": []
          }'

          for imsi in $(seq $start_imsi $end_imsi); do
            echo "Provisioning imsi-$imsi"

            payload=$(echo "$JSON_TEMPLATE" | sed "s/__IMSI__/$imsi/g" | sed "s/__PLMN__/${MCC}${MNC}/g")

            curl -s -X POST \
              "http://webui-service.free5gc.svc.cluster.local:5000/api/subscriber/imsi-${imsi}/${MCC}${MNC}" \
              -H "Token: admin" \
              -H "Content-Type: application/json" \
              --data-raw "$payload"
          done

          echo ""
          echo "===== Provisioned IMSIs ====="
          seq $start_imsi $end_imsi | sed 's/^/imsi-/'
