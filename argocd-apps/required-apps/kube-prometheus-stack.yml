apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack-crds
  namespace: argocd
  #annotations:
   # argocd.argoproj.io/sync-wave: "2"
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/prometheus-community/helm-charts.git
    path: charts/kube-prometheus-stack/charts/crds/crds #charts/kube-prometheus-stack/crds/
    targetRevision: HEAD
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:    
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - Replace=true
    - CreateNamespace=true
    

---

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  #annotations:
   # argocd.argoproj.io/sync-wave: "3"
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
  - chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: "76.2.1"
    helm:
     skipCrds: true
     values: |
       alertmanager:
         enabled: false
       windowsMonitoring:
          enabled: false
       grafana:
         sidecar:
           dashboards:
             enabled: true
             label: grafana_dashboard
  - repoURL: https://github.com/5g-cloud-labs/new-test-2.git
    path: k8s-resources/grafana-dashboards
    targetRevision: trims            
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:    
    automated:
      prune: true
      selfHeal: true
