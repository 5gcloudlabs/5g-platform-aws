apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: console-ui-app
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: oci://ghcr.io/5g-cloud-labs/helm/
    chart: console-ui
    targetRevision: 0.1.0
    helm:
     parameters:
     - name: Domain
       value: ${ARGOCD_ENV_DOMAIN_NAME}
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:    
    automated:
      prune: true
