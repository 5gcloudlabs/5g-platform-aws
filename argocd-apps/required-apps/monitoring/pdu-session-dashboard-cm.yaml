apiVersion: v1
kind: ConfigMap
metadata:
  name: pdu-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  pdu-dashboard.json: |
    {
      "uid": "pdu",
      "title": "PDU Session Establishment Dashboard",
      "schemaVersion": 40,
      "editable": true,
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "panels": [
        {
          "type": "stat",
          "title": "Successful PDU Session Establishment Count",
          "datasource": {
            "type": "loki",
            "name": "Loki"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "count_over_time({container=\"smf\"} |= \"| POST    | /nsmf-pdusession/v1/sm-contexts |\" [30m])",
              "legendFormat": ""
            }
          ]
        }
      ]
    }
