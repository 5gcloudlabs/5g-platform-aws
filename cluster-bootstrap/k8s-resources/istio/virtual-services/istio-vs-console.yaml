apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: istio-vs-console
  namespace: network-deployment-agent
spec:
  hosts:
  - HOSTNAME
  gateways:
  - istio-system/istio-gw
  http:
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: network-deployment-agent-frontend
        port:
          number: 8080
