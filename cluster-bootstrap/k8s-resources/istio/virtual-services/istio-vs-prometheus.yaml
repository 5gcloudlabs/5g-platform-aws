apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: istio-vs-prometheus
  namespace: monitoring
spec:
  hosts:
  - HOSTNAME
  gateways:
  - istio-system/istio-gw
  http:
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: kube-prometheus-stack-prometheus
        port:
          number: 9090
