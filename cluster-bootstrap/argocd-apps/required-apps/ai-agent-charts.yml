apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-agent
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/5g-cloud-labs/new-test-2.git
    targetRevision: trims
    path: cluster-bootstrap/helm-charts/ai-agent
    helm:
     parameters:
     - name: domain
       value: ${ARGOCD_ENV_DOMAIN_NAME}
     - name: serviceAccount.roleArn
       value: ${ARGOCD_ENV_AI_AGENT_BEDROCK_ROLE_ARN}       
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-agent
  syncPolicy:    
    automated:
      prune: true
      selfHeal: true      
    syncOptions:
    - CreateNamespace=true
