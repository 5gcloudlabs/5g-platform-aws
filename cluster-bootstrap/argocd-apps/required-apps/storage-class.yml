apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: storage-class
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/5g-cloud-labs/new-test-2.git
    targetRevision: trims
    path: k8s-resources/storage
    kustomize:
        patches:
        - target:
            kind: StorageClass
            name: efs-sc
          patch: |-
            - op: replace
              path: /parameters/fileSystemId
              value: ${ARGOCD_ENV_EFS_ID}
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:    
    automated:
      prune: true
