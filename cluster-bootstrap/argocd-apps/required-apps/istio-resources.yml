apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/5g-cloud-labs/new-test-2.git
    targetRevision: 5g-platform-aws
    path: cluster-bootstrap/k8s-resources/istio/gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:    
    automated:
      prune: true

---

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: virtual-services
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/5g-cloud-labs/new-test-2.git
    targetRevision: 5g-platform-aws
    path: cluster-bootstrap/k8s-resources/istio/virtual-services
    kustomize:
        patches:
        - target:
            kind: VirtualService
            name: istio-vs-console
          patch: |-
            - op: replace
              path: /spec/hosts/0
              value: "console.${ARGOCD_ENV_DOMAIN_NAME}"
        - target:
            kind: VirtualService
            name: istio-vs-argocd
          patch: |-
            - op: replace
              path: /spec/hosts/0
              value: "argocd.${ARGOCD_ENV_DOMAIN_NAME}"
        - target:
            kind: VirtualService
            name: istio-vs-webui
          patch: |-
            - op: replace
              path: /spec/hosts/0
              value: "webui.free5gc.${ARGOCD_ENV_DOMAIN_NAME}"
        - target:
            kind: VirtualService
            name: istio-vs-grafana
          patch: |-
            - op: replace
              path: /spec/hosts/0
              value: "grafana.${ARGOCD_ENV_DOMAIN_NAME}"
        - target:
            kind: VirtualService
            name: istio-vs-prometheus
          patch: |-
            - op: replace
              path: /spec/hosts/0
              value: "prometheus.${ARGOCD_ENV_DOMAIN_NAME}"                            
  destination:
    server: https://kubernetes.default.svc
    namespace: free5gc
  syncPolicy:    
    automated:
      prune: true
    syncOptions:
    - CreateNamespace=true           
