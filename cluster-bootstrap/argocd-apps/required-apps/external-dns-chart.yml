apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    chart: external-dns
    targetRevision: 1.19.0
    helm:
      parameters:
        - name: provider.name
          value: cloudflare

        - name: env[0].name
          value: CF_API_TOKEN

        - name: env[0].valueFrom.secretKeyRef.name
          value: cloudflare-api-token-secret

        - name: env[0].valueFrom.secretKeyRef.key
          value: cloudflare-api-token

        - name: domainFilters[0]
          value: ${ARGOCD_ENV_DOMAIN_NAME}

        - name: policy
          value: sync

        - name: txtOwnerId
          value: external-dns

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
