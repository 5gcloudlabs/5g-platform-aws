apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: PostSync  
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/5g-cloud-labs/new-test-2.git
    targetRevision: trims
    path: cluster-bootstrap/k8s-resources/ingress
    kustomize:
        patches:
        - target:
            kind: Ingress
            name: ingress
          patch: |-
            - op: replace
              path: /metadata/annotations/alb.ingress.kubernetes.io~1certificate-arn
              value: ${ARGOCD_ENV_ACM_CERTIFICATE_ARN}
            - op: replace
              path: /spec/rules/0/host
              value: "argocd.${ARGOCD_ENV_DOMAIN_NAME}"
            - op: replace
              path: /spec/rules/1/host
              value: "console.${ARGOCD_ENV_DOMAIN_NAME}"
            - op: replace
              path: /spec/rules/2/host
              value: "webui.${ARGOCD_ENV_DOMAIN_NAME}"
            - op: replace
              path: /spec/rules/3/host
              value: "grafana.${ARGOCD_ENV_DOMAIN_NAME}"
            - op: replace
              path: /spec/rules/4/host
              value: "prometheus.${ARGOCD_ENV_DOMAIN_NAME}"              
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:    
    automated:
      prune: true
