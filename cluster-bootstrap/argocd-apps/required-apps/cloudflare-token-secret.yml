apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflare-token-secret
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/5gcloudlabs/5g-platform-aws.git
    targetRevision: main
    path: cluster-bootstrap/k8s-resources/cloudflare-token-secret
    kustomize:
        patches:
        - target:
            kind: Secret
            name: cloudflare-api-token-secret
          patch: |-
            - op: replace
              path: /stringData/cloudflare-api-token
              value: ${ARGOCD_ENV_CF_API_TOKEN}
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:    
    automated:
      prune: true
