image:
  repository: ghcr.io/5g-cloud-labs/ai-agent
  tag: latest
  pullPolicy: Always

serviceAccount:
  name: ai-agent
  roleArn: ""

backend:
  replicas: 1
  port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

frontend:
  replicas: 1
  port: 8080
  serviceType: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

config:
  POLL_INTERVAL: "1"
  GITHUB_RAW_BASE: "https://raw.githubusercontent.com/5g-cloud-labs/new-test-2/trims"
  DOMAIN_NAME: ""
  AWS_DEFAULT_REGION: ""
  BEDROCK_REGION: ""
  BEDROCK_MODEL_ID: ""
