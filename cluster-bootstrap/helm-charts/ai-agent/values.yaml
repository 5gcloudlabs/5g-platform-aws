image:
  repository: ghcr.io/5g-cloud-labs/ai-agent
  tag: latest
  pullPolicy: Always

serviceAccount:
  name: ai-agent
  roleArn: ""

backend:
  replicas: 1
  port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

frontend:
  replicas: 1
  port: 8080
  serviceType: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

config:
  POLL_INTERVAL: "1"
  GITHUB_RAW_BASE: "https://raw.githubusercontent.com/5g-cloud-labs/new-test-2/trims"
  DOMAIN_NAME: ""
  AWS_DEFAULT_REGION: ""
  BEDROCK_REGION: ""
  BEDROCK_MODEL_ID: ""
  CORE_NAMESPACE: "free5gc"
  UERANSIM_NAMESPACE: "ueransim"
  PING_INTERFACE: "uesimtun0"
  PING_TARGET: "google.com"
  PING_COUNT: "10"
  ARGO_WF_BASE_PATH: "5g/argo-workflows"
  ARGOCD_APPS_BASE_PATH: "5g/argocd-apps"
