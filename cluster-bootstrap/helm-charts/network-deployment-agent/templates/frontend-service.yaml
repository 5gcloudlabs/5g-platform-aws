apiVersion: v1
kind: Service
metadata:
  name: network-deployment-agent-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    app: network-deployment-agent
    component: frontend
spec:
  selector:
    app: network-deployment-agent
    component: frontend
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}
      protocol: TCP
  type: {{ .Values.frontend.serviceType }}
