apiVersion: apps/v1
kind: Deployment
metadata:
  name: network-deployment-agent-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    app: network-deployment-agent
    component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: network-deployment-agent
      component: frontend
  template:
    metadata:
      labels:
        app: network-deployment-agent
        component: frontend
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: frontend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["chainlit", "run", "frontend.py", "-h", "--host", "0.0.0.0", "--port", "{{ .Values.frontend.port }}"]
          ports:
            - containerPort: {{ .Values.frontend.port }}
          envFrom:
            - configMapRef:
                name: network-deployment-agent-config
            - secretRef:
                name: network-deployment-agent-secret
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
