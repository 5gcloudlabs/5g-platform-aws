apiVersion: v1
kind: Service
metadata:
  name: network-deployment-agent-backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: network-deployment-agent
    component: backend
spec:
  selector:
    app: network-deployment-agent
    component: backend
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
      protocol: TCP
  type: ClusterIP
