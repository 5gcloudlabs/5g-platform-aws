apiVersion: apps/v1
kind: Deployment
metadata:
  name: network-deployment-agent-backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: network-deployment-agent
    component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: network-deployment-agent
      component: backend
  template:
    metadata:
      labels:
        app: network-deployment-agent
        component: backend
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "{{ .Values.backend.port }}"]
          ports:
            - containerPort: {{ .Values.backend.port }}
          envFrom:
            - configMapRef:
                name: network-deployment-agent-config
            - secretRef:
                name: network-deployment-agent-secret
          readinessProbe:
            httpGet:
              path: /status
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /status
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
