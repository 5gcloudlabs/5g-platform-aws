apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: whereabouts
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/k8snetworkplumbingwg/whereabouts.git
    targetRevision: HEAD
    path: deployment/whereabouts-chart
    helm:
     parameters:
     - name: "nodeSliceController.enabled"
       value: "false"
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:    
    automated:
      prune: true
      selfHeal: true
