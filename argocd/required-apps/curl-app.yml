apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: curl-app
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/amrbaraka/repo.git
    targetRevision: main
    path: curl
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:    
    automated:
      prune: true
      selfHeal: true
